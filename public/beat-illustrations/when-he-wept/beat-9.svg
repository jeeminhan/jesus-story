<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300">
  <defs>
    <style>
      @keyframes clothFall {
        0% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
        100% { transform: translateY(25px) rotate(8deg); opacity: 0; }
      }
      @keyframes clothFall2 {
        0% { transform: translateY(0) rotate(0deg); opacity: 0.5; }
        100% { transform: translateY(22px) rotate(-6deg); opacity: 0; }
      }
      @keyframes unwrapPull {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(-4px); }
      }
      @keyframes unwrapPull2 {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(4px); }
      }
      @keyframes gentleBreathe {
        0%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(1.015); }
      }
    </style>
  </defs>

  <rect width="360" height="300" fill="#0D0A0E"/>

  <!-- Stars -->
  <circle cx="25" cy="18" r="0.7" fill="#D4C4A8" opacity="0.25"/>
  <circle cx="100" cy="25" r="0.5" fill="#D4C4A8" opacity="0.2"/>
  <circle cx="200" cy="15" r="0.6" fill="#D4C4A8" opacity="0.22"/>
  <circle cx="310" cy="20" r="0.8" fill="#D4C4A8" opacity="0.18"/>
  <circle cx="340" cy="40" r="0.4" fill="#D4C4A8" opacity="0.15"/>
  <circle cx="55" cy="45" r="0.5" fill="#D4C4A8" opacity="0.17"/>

  <!-- Distant rocky landscape -->
  <path d="M0 120 Q80 100 160 110 Q240 95 320 105 Q350 100 360 108" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.12"/>

  <!-- Tomb in far background (small) -->
  <path d="M300 108 Q300 100 310 98 Q320 96 324 100 Q328 104 328 110 L300 110Z" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="0.4" opacity="0.18"/>
  <circle cx="336" cy="110" r="6" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="0.3" opacity="0.12"/>

  <!-- Ground -->
  <line x1="0" y1="240" x2="360" y2="240" stroke="#D4C4A8" stroke-width="0.8" opacity="0.3"/>
  <line x1="20" y1="243" x2="28" y2="243" stroke="#D4C4A8" stroke-width="0.3" opacity="0.1"/>
  <line x1="80" y1="244" x2="88" y2="244" stroke="#D4C4A8" stroke-width="0.3" opacity="0.1"/>
  <line x1="270" y1="243" x2="278" y2="243" stroke="#D4C4A8" stroke-width="0.3" opacity="0.1"/>
  <line x1="340" y1="244" x2="348" y2="244" stroke="#D4C4A8" stroke-width="0.3" opacity="0.1"/>
  <ellipse cx="150" cy="243" rx="2.5" ry="1" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.08"/>
  <ellipse cx="230" cy="243" rx="2" ry="0.8" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.08"/>
  <!-- Grass tufts -->
  <path d="M10 240 Q12 234 14 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.12"/>
  <path d="M330 240 Q332 234 334 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.12"/>

  <!-- Warm glow over the scene -->
  <circle cx="180" cy="190" r="70" fill="#C4A66A" opacity="0.03"/>
  <circle cx="180" cy="190" r="40" fill="#C4A66A" opacity="0.04"/>

  <!-- HELPER 1 (left, pulling cloth away) -->
  <g style="transform-box: fill-box; transform-origin: 50% 100%; animation: unwrapPull 2.5s ease-in-out infinite;">
    <circle cx="115" cy="178" r="11" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="0.9"/>
    <path d="M105 175 Q115 167 125 175" fill="none" stroke="#D4C4A8" stroke-width="0.6" opacity="0.4"/>
    <!-- Eyes (focused on task) -->
    <circle cx="119" cy="177" r="0.9" fill="#D4C4A8" opacity="0.5"/>
    <line x1="117" y1="179" x2="118" y2="182" stroke="#D4C4A8" stroke-width="0.4"/>
    <line x1="113" y1="184" x2="119" y2="184" stroke="#D4C4A8" stroke-width="0.3" opacity="0.4"/>
    <!-- Neck -->
    <line x1="115" y1="189" x2="115" y2="194" stroke="#D4C4A8" stroke-width="1"/>
    <!-- Body -->
    <path d="M115 194 Q117 210 115 236" fill="none" stroke="#D4C4A8" stroke-width="1"/>
    <path d="M109 196 Q105 215 103 236" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.3"/>
    <path d="M121 196 Q125 215 127 236" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.3"/>
    <!-- Arms reaching toward Lazarus (pulling cloth) -->
    <path d="M117 198 Q135 190 150 188" fill="none" stroke="#D4C4A8" stroke-width="0.9"/>
    <line x1="150" y1="188" x2="153" y2="186" stroke="#D4C4A8" stroke-width="0.4"/>
    <line x1="150" y1="188" x2="153" y2="189" stroke="#D4C4A8" stroke-width="0.4"/>
    <!-- Cloth in hand trailing away -->
    <path d="M150 188 Q140 195 128 200 Q115 205 100 200" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.4"/>
    <!-- Other arm -->
    <path d="M113 198 Q105 208 100 215" fill="none" stroke="#D4C4A8" stroke-width="0.8"/>
    <line x1="100" y1="215" x2="97" y2="214" stroke="#D4C4A8" stroke-width="0.4"/>
    <!-- Legs -->
    <line x1="114" y1="236" x2="108" y2="240" stroke="#D4C4A8" stroke-width="0.9"/>
    <line x1="116" y1="236" x2="122" y2="240" stroke="#D4C4A8" stroke-width="0.9"/>
    <line x1="108" y1="240" x2="104" y2="240" stroke="#D4C4A8" stroke-width="0.6"/>
    <line x1="122" y1="240" x2="126" y2="240" stroke="#D4C4A8" stroke-width="0.6"/>
  </g>

  <!-- LAZARUS (center, being unwrapped) -->
  <g style="transform-box: fill-box; transform-origin: 50% 100%; animation: gentleBreathe 4s ease-in-out infinite;">
    <!-- Head (partially unwrapped now) -->
    <circle cx="180" cy="170" r="14" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="1.2"/>
    <!-- Some wrapping remaining on head -->
    <path d="M168 166 Q180 158 192 166" fill="none" stroke="#D4C4A8" stroke-width="0.6" opacity="0.4"/>
    <path d="M170 172 Q180 169 190 172" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.3"/>
    <!-- Both eyes visible now, blinking awake -->
    <circle cx="175" cy="169" r="1" fill="#D4C4A8" opacity="0.6"/>
    <circle cx="185" cy="169" r="1" fill="#D4C4A8" opacity="0.6"/>
    <!-- Nose -->
    <line x1="180" y1="171" x2="180" y2="175" stroke="#D4C4A8" stroke-width="0.5"/>
    <!-- Mouth (slightly open, breathing) -->
    <ellipse cx="180" cy="178" rx="2.5" ry="1" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.5"/>

    <!-- Neck (cloth loosening) -->
    <line x1="180" y1="184" x2="180" y2="190" stroke="#D4C4A8" stroke-width="1.2"/>
    <path d="M175 186 Q180 184 185 186" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.25"/>

    <!-- Body (wrapping loosening, coming undone) -->
    <path d="M180 190 Q182 210 180 238" fill="none" stroke="#D4C4A8" stroke-width="1.3"/>
    <!-- Loose wrapping bands -->
    <path d="M172 195 Q180 192 188 195" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.35"/>
    <path d="M170 204 Q180 200 190 204" fill="none" stroke="#D4C4A8" stroke-width="0.45" opacity="0.3"/>
    <path d="M171 213 Q180 210 189 213" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.25"/>
    <path d="M172 222 Q180 219 188 222" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.2"/>
    <!-- Robe visible beneath -->
    <path d="M173 193 Q168 215 166 238" fill="none" stroke="#D4C4A8" stroke-width="0.6" opacity="0.35"/>
    <path d="M187 193 Q192 215 194 238" fill="none" stroke="#D4C4A8" stroke-width="0.6" opacity="0.35"/>

    <!-- Arms beginning to spread (freed) -->
    <path d="M178 194 Q168 202 160 210" fill="none" stroke="#D4C4A8" stroke-width="1"/>
    <path d="M182 194 Q192 202 200 210" fill="none" stroke="#D4C4A8" stroke-width="1"/>
    <!-- Dangling cloth from arms -->
    <path d="M160 210 Q155 218 152 225" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.3" style="transform-box: fill-box; transform-origin: 50% 0%; animation: clothFall2 3s ease-out infinite;"/>
    <path d="M200 210 Q205 218 208 225" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.3" style="transform-box: fill-box; transform-origin: 50% 0%; animation: clothFall 3s ease-out infinite 0.5s;"/>

    <!-- Legs -->
    <line x1="179" y1="238" x2="173" y2="240" stroke="#D4C4A8" stroke-width="1"/>
    <line x1="181" y1="238" x2="187" y2="240" stroke="#D4C4A8" stroke-width="1"/>
    <line x1="173" y1="240" x2="169" y2="240" stroke="#D4C4A8" stroke-width="0.7"/>
    <line x1="187" y1="240" x2="191" y2="240" stroke="#D4C4A8" stroke-width="0.7"/>
  </g>

  <!-- HELPER 2 (right, pulling cloth) -->
  <g style="transform-box: fill-box; transform-origin: 50% 100%; animation: unwrapPull2 2.5s ease-in-out infinite;">
    <circle cx="245" cy="180" r="11" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="0.9"/>
    <path d="M235 177 Q245 169 255 177" fill="none" stroke="#D4C4A8" stroke-width="0.6" opacity="0.4"/>
    <circle cx="241" cy="179" r="0.9" fill="#D4C4A8" opacity="0.5"/>
    <line x1="243" y1="181" x2="242" y2="184" stroke="#D4C4A8" stroke-width="0.4"/>
    <line x1="241" y1="186" x2="247" y2="186" stroke="#D4C4A8" stroke-width="0.3" opacity="0.4"/>
    <line x1="245" y1="191" x2="245" y2="196" stroke="#D4C4A8" stroke-width="1"/>
    <path d="M245 196 Q243 212 245 236" fill="none" stroke="#D4C4A8" stroke-width="1"/>
    <path d="M239 198 Q235 215 233 236" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.3"/>
    <path d="M251 198 Q255 215 257 236" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.3"/>
    <!-- Arm reaching toward Lazarus -->
    <path d="M243 200 Q225 192 210 190" fill="none" stroke="#D4C4A8" stroke-width="0.9"/>
    <line x1="210" y1="190" x2="207" y2="188" stroke="#D4C4A8" stroke-width="0.4"/>
    <line x1="210" y1="190" x2="207" y2="191" stroke="#D4C4A8" stroke-width="0.4"/>
    <!-- Cloth trailing in hand -->
    <path d="M210 190 Q220 197 232 202 Q245 207 260 202" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.4"/>
    <!-- Other arm -->
    <path d="M247 200 Q255 210 260 217" fill="none" stroke="#D4C4A8" stroke-width="0.8"/>
    <!-- Legs -->
    <line x1="244" y1="236" x2="238" y2="240" stroke="#D4C4A8" stroke-width="0.9"/>
    <line x1="246" y1="236" x2="252" y2="240" stroke="#D4C4A8" stroke-width="0.9"/>
    <line x1="238" y1="240" x2="234" y2="240" stroke="#D4C4A8" stroke-width="0.6"/>
    <line x1="252" y1="240" x2="256" y2="240" stroke="#D4C4A8" stroke-width="0.6"/>
  </g>

  <!-- FALLING CLOTH STRIPS (the linens being removed) -->
  <line x1="155" y1="195" x2="148" y2="215" stroke="#D4C4A8" stroke-width="0.6" opacity="0" style="animation: clothFall 4s ease-in infinite;"/>
  <line x1="205" y1="193" x2="212" y2="213" stroke="#D4C4A8" stroke-width="0.6" opacity="0" style="animation: clothFall2 4.5s ease-in infinite 1s;"/>
  <line x1="170" y1="200" x2="163" y2="220" stroke="#D4C4A8" stroke-width="0.5" opacity="0" style="animation: clothFall 5s ease-in infinite 2s;"/>
  <line x1="195" y1="198" x2="202" y2="218" stroke="#D4C4A8" stroke-width="0.5" opacity="0" style="animation: clothFall2 4.2s ease-in infinite 3s;"/>
  <path d="M160 205 Q158 212 155 220" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0" style="animation: clothFall 3.8s ease-in infinite 1.5s;"/>
  <path d="M200 203 Q203 210 206 218" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0" style="animation: clothFall2 4.8s ease-in infinite 2.5s;"/>

  <!-- Cloth piled on ground -->
  <path d="M165 240 Q170 237 175 240 Q180 237 185 240 Q190 237 195 240" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.2"/>
  <path d="M162 240 Q168 235 173 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <path d="M187 240 Q192 235 198 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>

  <!-- Shadows -->
  <ellipse cx="115" cy="241" rx="14" ry="1.5" fill="#D4C4A8" opacity="0.03"/>
  <ellipse cx="180" cy="241" rx="16" ry="2" fill="#D4C4A8" opacity="0.04"/>
  <ellipse cx="245" cy="241" rx="14" ry="1.5" fill="#D4C4A8" opacity="0.03"/>

  <!-- Text -->
  <text x="180" y="275" text-anchor="middle" fill="#D4C4A8" font-family="serif" font-size="11" opacity="0.5" letter-spacing="3">UNWRAPPING</text>
</svg>