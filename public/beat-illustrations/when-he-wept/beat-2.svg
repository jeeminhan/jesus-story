<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300">
  <defs>
    <style>
      @keyframes sandFall {
        0% { transform: translateY(0); opacity: 0.5; }
        100% { transform: translateY(28px); opacity: 0; }
      }
      @keyframes breathe {
        0%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(1.018); }
      }
      @keyframes shadowPulse {
        0%, 100% { opacity: 0.04; }
        50% { opacity: 0.1; }
      }
      @keyframes celestialMove {
        0% { opacity: 0.12; }
        50% { opacity: 0.25; }
        100% { opacity: 0.12; }
      }
    </style>
  </defs>

  <rect width="360" height="300" fill="#0D0A0E"/>

  <!-- Slow-moving sun (time passing) -->
  <circle r="18" fill="#C4A66A" opacity="0.12">
    <animate attributeName="cx" values="70;180;290;70" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="60;32;60;60" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.12;0.25;0.12;0.12" dur="14s" repeatCount="indefinite"/>
  </circle>
  <circle r="32" fill="#C4A66A" opacity="0.04">
    <animate attributeName="cx" values="70;180;290;70" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="60;32;60;60" dur="14s" repeatCount="indefinite"/>
  </circle>

  <!-- Stars fading in and out with day/night -->
  <circle cx="40" cy="30" r="0.8" fill="#D4C4A8">
    <animate attributeName="opacity" values="0.5;0;0;0.5" dur="14s" repeatCount="indefinite"/>
  </circle>
  <circle cx="120" cy="22" r="0.6" fill="#D4C4A8">
    <animate attributeName="opacity" values="0.4;0;0;0.4" dur="14s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="28" r="0.7" fill="#D4C4A8">
    <animate attributeName="opacity" values="0.35;0;0;0.35" dur="14s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="20" r="0.9" fill="#D4C4A8">
    <animate attributeName="opacity" values="0.6;0;0;0.6" dur="14s" repeatCount="indefinite"/>
  </circle>
  <circle cx="170" cy="15" r="0.5" fill="#D4C4A8">
    <animate attributeName="opacity" values="0.3;0;0;0.3" dur="14s" repeatCount="indefinite"/>
  </circle>

  <!-- Distant landscape -->
  <path d="M0 185 Q45 170 90 178 Q135 168 180 175 Q225 165 270 172 Q315 162 360 175" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.18"/>
  <path d="M0 190 Q60 182 120 186 Q200 178 280 183 Q330 177 360 182" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.1"/>

  <!-- Tree on left -->
  <line x1="50" y1="240" x2="50" y2="188" stroke="#D4C4A8" stroke-width="1.5" opacity="0.35"/>
  <line x1="50" y1="200" x2="38" y2="186" stroke="#D4C4A8" stroke-width="0.8" opacity="0.3"/>
  <line x1="50" y1="195" x2="64" y2="181" stroke="#D4C4A8" stroke-width="0.8" opacity="0.3"/>
  <line x1="50" y1="205" x2="32" y2="195" stroke="#D4C4A8" stroke-width="0.6" opacity="0.2"/>
  <ellipse cx="36" cy="182" rx="10" ry="6" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.22"/>
  <ellipse cx="55" cy="177" rx="12" ry="7" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.22"/>
  <ellipse cx="68" cy="180" rx="8" ry="5" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.18"/>
  <ellipse cx="28" cy="192" rx="7" ry="4" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <path d="M32 180 Q36 177 40 181" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.2"/>
  <path d="M51 175 Q55 172 59 176" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.2"/>

  <!-- Tree on right (smaller) -->
  <line x1="310" y1="240" x2="310" y2="200" stroke="#D4C4A8" stroke-width="1" opacity="0.25"/>
  <line x1="310" y1="210" x2="302" y2="200" stroke="#D4C4A8" stroke-width="0.6" opacity="0.2"/>
  <line x1="310" y1="205" x2="320" y2="196" stroke="#D4C4A8" stroke-width="0.6" opacity="0.2"/>
  <ellipse cx="300" cy="197" rx="8" ry="5" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <ellipse cx="315" cy="193" rx="9" ry="5" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>

  <!-- Stone wall / bench -->
  <rect x="120" y="225" width="60" height="15" fill="none" stroke="#D4C4A8" stroke-width="0.8" opacity="0.35"/>
  <line x1="140" y1="225" x2="140" y2="240" stroke="#D4C4A8" stroke-width="0.3" opacity="0.18"/>
  <line x1="160" y1="225" x2="160" y2="240" stroke="#D4C4A8" stroke-width="0.3" opacity="0.18"/>
  <line x1="120" y1="232" x2="180" y2="232" stroke="#D4C4A8" stroke-width="0.25" opacity="0.12"/>
  <!-- Texture on wall -->
  <line x1="125" y1="228" x2="135" y2="228" stroke="#D4C4A8" stroke-width="0.2" opacity="0.1"/>
  <line x1="145" y1="228" x2="155" y2="228" stroke="#D4C4A8" stroke-width="0.2" opacity="0.1"/>
  <line x1="165" y1="228" x2="175" y2="228" stroke="#D4C4A8" stroke-width="0.2" opacity="0.1"/>

  <!-- Ground -->
  <line x1="0" y1="240" x2="360" y2="240" stroke="#D4C4A8" stroke-width="0.8" opacity="0.35"/>
  <line x1="15" y1="243" x2="22" y2="243" stroke="#D4C4A8" stroke-width="0.3" opacity="0.12"/>
  <line x1="80" y1="244" x2="86" y2="244" stroke="#D4C4A8" stroke-width="0.3" opacity="0.12"/>
  <line x1="200" y1="243" x2="207" y2="243" stroke="#D4C4A8" stroke-width="0.3" opacity="0.12"/>
  <line x1="280" y1="244" x2="288" y2="244" stroke="#D4C4A8" stroke-width="0.3" opacity="0.12"/>
  <ellipse cx="250" cy="243" rx="2" ry="1" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.12"/>
  <circle cx="340" cy="242" r="1.2" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.12"/>
  <!-- Grass -->
  <path d="M210 240 Q212 234 214 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <path d="M290 240 Q292 235 294 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <path d="M340 240 Q342 233 344 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>

  <!-- JESUS (seated, still, waiting) -->
  <g style="transform-box: fill-box; transform-origin: 50% 100%; animation: breathe 6s ease-in-out infinite;">
    <!-- Head -->
    <circle cx="150" cy="190" r="14" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="1.2"/>
    <!-- Hair/head covering -->
    <path d="M137 186 Q150 174 163 186" fill="none" stroke="#D4C4A8" stroke-width="0.8"/>
    <path d="M137 186 Q133 200 136 210" fill="none" stroke="#D4C4A8" stroke-width="0.6" opacity="0.45"/>
    <path d="M163 186 Q167 200 164 210" fill="none" stroke="#D4C4A8" stroke-width="0.6" opacity="0.45"/>
    <!-- Eyes closed (meditative) -->
    <path d="M144 189 Q146 191 148 189" fill="none" stroke="#D4C4A8" stroke-width="0.6"/>
    <path d="M152 189 Q154 191 156 189" fill="none" stroke="#D4C4A8" stroke-width="0.6"/>
    <!-- Nose -->
    <line x1="150" y1="191" x2="150" y2="195" stroke="#D4C4A8" stroke-width="0.5"/>
    <!-- Mouth (still) -->
    <line x1="147" y1="198" x2="153" y2="198" stroke="#D4C4A8" stroke-width="0.4" opacity="0.45"/>
    <!-- Beard -->
    <path d="M143 198 Q150 207 157 198" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.35"/>

    <!-- Neck -->
    <line x1="150" y1="204" x2="150" y2="210" stroke="#D4C4A8" stroke-width="1.2"/>
    <!-- Body seated -->
    <path d="M150 210 Q152 218 150 225" fill="none" stroke="#D4C4A8" stroke-width="1.2"/>
    <!-- Robe -->
    <path d="M142 212 Q138 220 135 228" fill="none" stroke="#D4C4A8" stroke-width="0.6" opacity="0.4"/>
    <path d="M158 212 Q162 220 165 228" fill="none" stroke="#D4C4A8" stroke-width="0.6" opacity="0.4"/>
    <path d="M140 218 Q150 222 160 218" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.25"/>
    <path d="M138 224 Q150 227 162 224" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.2"/>

    <!-- Arms on knees -->
    <path d="M148 214 Q138 220 132 222" fill="none" stroke="#D4C4A8" stroke-width="1"/>
    <line x1="132" y1="222" x2="130" y2="220" stroke="#D4C4A8" stroke-width="0.5"/>
    <line x1="132" y1="222" x2="130" y2="223" stroke="#D4C4A8" stroke-width="0.5"/>
    <line x1="132" y1="222" x2="129" y2="222" stroke="#D4C4A8" stroke-width="0.4"/>
    <path d="M152 214 Q162 220 168 222" fill="none" stroke="#D4C4A8" stroke-width="1"/>
    <line x1="168" y1="222" x2="170" y2="220" stroke="#D4C4A8" stroke-width="0.5"/>
    <line x1="168" y1="222" x2="170" y2="223" stroke="#D4C4A8" stroke-width="0.5"/>
    <line x1="168" y1="222" x2="171" y2="222" stroke="#D4C4A8" stroke-width="0.4"/>

    <!-- Legs seated -->
    <path d="M150 225 Q138 230 130 225" fill="none" stroke="#D4C4A8" stroke-width="1.2"/>
    <line x1="130" y1="225" x2="125" y2="235" stroke="#D4C4A8" stroke-width="1"/>
    <line x1="125" y1="235" x2="120" y2="240" stroke="#D4C4A8" stroke-width="0.9"/>
    <line x1="120" y1="240" x2="116" y2="240" stroke="#D4C4A8" stroke-width="0.7"/>
    <path d="M150 225 Q162 230 170 225" fill="none" stroke="#D4C4A8" stroke-width="1.2"/>
    <line x1="170" y1="225" x2="175" y2="235" stroke="#D4C4A8" stroke-width="1"/>
    <line x1="175" y1="235" x2="180" y2="240" stroke="#D4C4A8" stroke-width="0.9"/>
    <line x1="180" y1="240" x2="184" y2="240" stroke="#D4C4A8" stroke-width="0.7"/>
  </g>

  <!-- Shadow -->
  <ellipse cx="150" cy="241" rx="30" ry="3" fill="#D4C4A8" opacity="0.05" style="animation: shadowPulse 6s ease-in-out infinite;"/>

  <!-- Hourglass (ethereal, abstract) -->
  <path d="M252 82 L270 82 L261 108 L270 134 L252 134 L261 108Z" fill="none" stroke="#C4A66A" stroke-width="0.6" opacity="0.2"/>
  <line x1="250" y1="82" x2="272" y2="82" stroke="#C4A66A" stroke-width="0.4" opacity="0.18"/>
  <line x1="250" y1="134" x2="272" y2="134" stroke="#C4A66A" stroke-width="0.4" opacity="0.18"/>
  <!-- Sand particles falling -->
  <circle cx="261" cy="100" r="0.8" fill="#C4A66A" style="animation: sandFall 3.5s linear infinite;"/>
  <circle cx="259" cy="103" r="0.6" fill="#C4A66A" style="animation: sandFall 3.5s linear infinite 0.7s;"/>
  <circle cx="263" cy="98" r="0.7" fill="#C4A66A" style="animation: sandFall 3.5s linear infinite 1.4s;"/>
  <circle cx="260" cy="106" r="0.5" fill="#C4A66A" style="animation: sandFall 3.5s linear infinite 2.1s;"/>
  <circle cx="262" cy="101" r="0.6" fill="#C4A66A" style="animation: sandFall 3.5s linear infinite 2.8s;"/>
  <!-- Accumulated sand at bottom -->
  <path d="M255 130 Q261 125 267 130" fill="none" stroke="#C4A66A" stroke-width="0.4" opacity="0.15"/>

  <!-- Text -->
  <text x="180" y="280" text-anchor="middle" fill="#D4C4A8" font-family="serif" font-size="11" opacity="0.5" letter-spacing="3">THE DELAY</text>
</svg>