<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300">
  <defs>
    <style>
      @keyframes aliveBreath {
        0%, 100% { transform: scaleY(1); }
        50% { transform: scaleY(1.03); }
      }
      @keyframes lightRadiate1 {
        0% { r: 15; opacity: 0.12; }
        100% { r: 90; opacity: 0; }
      }
      @keyframes lightRadiate2 {
        0% { r: 10; opacity: 0.1; }
        100% { r: 75; opacity: 0; }
      }
      @keyframes lightRadiate3 {
        0% { r: 8; opacity: 0.08; }
        100% { r: 60; opacity: 0; }
      }
      @keyframes warmGlow {
        0%, 100% { opacity: 0.06; }
        50% { opacity: 0.12; }
      }
      @keyframes chestRise {
        0%, 100% { transform: scaleX(1); }
        50% { transform: scaleX(1.04); }
      }
    </style>
  </defs>

  <rect width="360" height="300" fill="#0D0A0E"/>

  <!-- Stars (brighter now, celebration) -->
  <circle cx="20" cy="18" r="0.8" fill="#D4C4A8" opacity="0.45"/>
  <circle cx="65" cy="30" r="0.6" fill="#D4C4A8" opacity="0.4"/>
  <circle cx="110" cy="15" r="0.9" fill="#D4C4A8" opacity="0.35"/>
  <circle cx="170" cy="22" r="0.7" fill="#D4C4A8" opacity="0.38"/>
  <circle cx="230" cy="12" r="0.8" fill="#D4C4A8" opacity="0.42"/>
  <circle cx="290" cy="25" r="0.6" fill="#D4C4A8" opacity="0.35"/>
  <circle cx="340" cy="18" r="0.9" fill="#D4C4A8" opacity="0.4"/>
  <circle cx="50" cy="50" r="0.5" fill="#D4C4A8" opacity="0.3"/>
  <circle cx="150" cy="42" r="0.6" fill="#D4C4A8" opacity="0.28"/>
  <circle cx="250" cy="38" r="0.7" fill="#D4C4A8" opacity="0.32"/>
  <circle cx="320" cy="48" r="0.5" fill="#D4C4A8" opacity="0.25"/>

  <!-- Distant landscape -->
  <path d="M0 130 Q60 115 120 122 Q180 110 240 118 Q300 108 360 120" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <path d="M0 138 Q80 128 160 132 Q240 125 320 130 Q350 128 360 130" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.08"/>

  <!-- Trees (life) -->
  <line x1="30" y1="240" x2="30" y2="195" stroke="#D4C4A8" stroke-width="1.2" opacity="0.25"/>
  <line x1="30" y1="208" x2="20" y2="197" stroke="#D4C4A8" stroke-width="0.7" opacity="0.2"/>
  <line x1="30" y1="202" x2="42" y2="192" stroke="#D4C4A8" stroke-width="0.7" opacity="0.2"/>
  <ellipse cx="18" cy="194" rx="8" ry="5" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <ellipse cx="35" cy="189" rx="10" ry="6" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <ellipse cx="46" cy="191" rx="7" ry="4" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.12"/>

  <line x1="330" y1="240" x2="330" y2="198" stroke="#D4C4A8" stroke-width="1.2" opacity="0.25"/>
  <line x1="330" y1="210" x2="320" y2="200" stroke="#D4C4A8" stroke-width="0.7" opacity="0.2"/>
  <line x1="330" y1="204" x2="342" y2="195" stroke="#D4C4A8" stroke-width="0.7" opacity="0.2"/>
  <ellipse cx="318" cy="197" rx="8" ry="5" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <ellipse cx="335" cy="192" rx="10" ry="6" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <ellipse cx="346" cy="194" rx="7" ry="4" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.12"/>

  <!-- Ground -->
  <line x1="0" y1="240" x2="360" y2="240" stroke="#D4C4A8" stroke-width="0.8" opacity="0.35"/>
  <line x1="60" y1="243" x2="68" y2="243" stroke="#D4C4A8" stroke-width="0.3" opacity="0.1"/>
  <line x1="140" y1="244" x2="148" y2="244" stroke="#D4C4A8" stroke-width="0.3" opacity="0.1"/>
  <line x1="220" y1="243" x2="228" y2="243" stroke="#D4C4A8" stroke-width="0.3" opacity="0.1"/>
  <line x1="290" y1="244" x2="298" y2="244" stroke="#D4C4A8" stroke-width="0.3" opacity="0.1"/>
  <ellipse cx="100" cy="243" rx="2" ry="0.8" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.08"/>
  <ellipse cx="260" cy="243" rx="2.5" ry="1" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.08"/>
  <!-- Grass -->
  <path d="M70 240 Q72 234 74 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <path d="M185 240 Q187 235 189 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.12"/>
  <path d="M280 240 Q282 233 284 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.12"/>

  <!-- RADIATING LIGHT from Lazarus (the miracle fulfilled) -->
  <circle cx="180" cy="190" fill="none" stroke="#C4A66A" stroke-width="0.6">
    <animate attributeName="r" values="15;90;90" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.12;0;0" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="190" fill="none" stroke="#C4A66A" stroke-width="0.5">
    <animate attributeName="r" values="10;75;75" dur="5s" repeatCount="indefinite" begin="1.25s"/>
    <animate attributeName="opacity" values="0.1;0;0" dur="5s" repeatCount="indefinite" begin="1.25s"/>
  </circle>
  <circle cx="180" cy="190" fill="none" stroke="#C4A66A" stroke-width="0.4">
    <animate attributeName="r" values="8;60;60" dur="5s" repeatCount="indefinite" begin="2.5s"/>
    <animate attributeName="opacity" values="0.08;0;0" dur="5s" repeatCount="indefinite" begin="2.5s"/>
  </circle>
  <circle cx="180" cy="190" fill="none" stroke="#C4A66A" stroke-width="0.3">
    <animate attributeName="r" values="5;50;50" dur="5s" repeatCount="indefinite" begin="3.75s"/>
    <animate attributeName="opacity" values="0.07;0;0" dur="5s" repeatCount="indefinite" begin="3.75s"/>
  </circle>

  <!-- Warm glow behind Lazarus -->
  <circle cx="180" cy="190" r="50" fill="#C4A66A" opacity="0.06" style="animation: warmGlow 4s ease-in-out infinite;"/>
  <circle cx="180" cy="190" r="30" fill="#C4A66A" opacity="0.08" style="animation: warmGlow 4s ease-in-out infinite 1s;"/>

  <!-- Discarded cloth on ground (the wrappings, left behind) -->
  <path d="M155 240 Q160 236 165 240 Q170 236 175 240" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.2"/>
  <path d="M185 240 Q190 235 195 240 Q200 236 205 240" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.2"/>
  <path d="M152 240 Q156 234 160 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <path d="M200 240 Q205 234 210 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <line x1="162" y1="239" x2="168" y2="237" stroke="#D4C4A8" stroke-width="0.3" opacity="0.12"/>
  <line x1="192" y1="238" x2="198" y2="236" stroke="#D4C4A8" stroke-width="0.3" opacity="0.12"/>

  <!-- LAZARUS (center, standing FREE, breathing, alive) -->
  <g style="transform-box: fill-box; transform-origin: 50% 100%; animation: aliveBreath 3.5s ease-in-out infinite;">
    <!-- Head (fully uncovered, face clear) -->
    <circle cx="180" cy="160" r="15" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="1.3"/>
    <!-- Hair -->
    <path d="M166 155 Q180 145 194 155" fill="none" stroke="#D4C4A8" stroke-width="0.8" opacity="0.5"/>
    <path d="M167 158 Q180 150 193 158" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.3"/>
    <!-- Eyes OPEN (alive, seeing) -->
    <circle cx="174" cy="159" r="1.5" fill="#D4C4A8" opacity="0.8"/>
    <circle cx="186" cy="159" r="1.5" fill="#D4C4A8" opacity="0.8"/>
    <!-- Eyebrows (wonder) -->
    <path d="M171 156 Q174 154 177 156" fill="none" stroke="#D4C4A8" stroke-width="0.4"/>
    <path d="M183 156 Q186 154 189 156" fill="none" stroke="#D4C4A8" stroke-width="0.4"/>
    <!-- Nose -->
    <line x1="180" y1="161" x2="180" y2="166" stroke="#D4C4A8" stroke-width="0.5"/>
    <!-- Mouth (slightly open, breathing, alive) -->
    <ellipse cx="180" cy="170" rx="3" ry="1.5" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.6"/>

    <!-- Neck -->
    <line x1="180" y1="175" x2="180" y2="182" stroke="#D4C4A8" stroke-width="1.3"/>

    <!-- CHEST (breathing, visible expansion) -->
    <g style="transform-box: fill-box; transform-origin: 50% 50%; animation: chestRise 3.5s ease-in-out infinite;">
      <path d="M180 182 Q182 200 180 220" fill="none" stroke="#D4C4A8" stroke-width="1.3"/>
      <!-- Robe (simple, clean, no more wrappings) -->
      <path d="M170 184 Q164 205 162 238" fill="none" stroke="#D4C4A8" stroke-width="0.7" opacity="0.45"/>
      <path d="M190 184 Q196 205 198 238" fill="none" stroke="#D4C4A8" stroke-width="0.7" opacity="0.45"/>
      <path d="M167 195 Q180 199 193 195" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.25"/>
      <path d="M165 210 Q180 214 195 210" fill="none" stroke="#D4C4A8" stroke-width="0.35" opacity="0.2"/>
      <path d="M163 228 Q180 232 197 228" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.15"/>
    </g>

    <!-- Arms spread wide (freedom, life) -->
    <path d="M178 186 Q158 180 140 178" fill="none" stroke="#D4C4A8" stroke-width="1.1"/>
    <!-- Left hand (open, fingers spread) -->
    <line x1="140" y1="178" x2="135" y2="175" stroke="#D4C4A8" stroke-width="0.5"/>
    <line x1="140" y1="178" x2="134" y2="177" stroke="#D4C4A8" stroke-width="0.5"/>
    <line x1="140" y1="178" x2="135" y2="180" stroke="#D4C4A8" stroke-width="0.5"/>
    <line x1="140" y1="178" x2="137" y2="182" stroke="#D4C4A8" stroke-width="0.4"/>

    <path d="M182 186 Q202 180 220 178" fill="none" stroke="#D4C4A8" stroke-width="1.1"/>
    <!-- Right hand -->
    <line x1="220" y1="178" x2="225" y2="175" stroke="#D4C4A8" stroke-width="0.5"/>
    <line x1="220" y1="178" x2="226" y2="177" stroke="#D4C4A8" stroke-width="0.5"/>
    <line x1="220" y1="178" x2="225" y2="180" stroke="#D4C4A8" stroke-width="0.5"/>
    <line x1="220" y1="178" x2="223" y2="182" stroke="#D4C4A8" stroke-width="0.4"/>

    <!-- Legs (standing firm) -->
    <path d="M179 234 Q175 237 170 240" fill="none" stroke="#D4C4A8" stroke-width="1.1"/>
    <path d="M181 234 Q185 237 190 240" fill="none" stroke="#D4C4A8" stroke-width="1.1"/>
    <line x1="170" y1="240" x2="165" y2="240" stroke="#D4C4A8" stroke-width="0.8"/>
    <line x1="190" y1="240" x2="195" y2="240" stroke="#D4C4A8" stroke-width="0.8"/>
  </g>

  <!-- Shadow -->
  <ellipse cx="180" cy="241" rx="20" ry="2.5" fill="#D4C4A8" opacity="0.06"/>

  <!-- Joyful onlookers on sides -->
  <!-- Left group -->
  <circle cx="65" cy="200" r="8" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="0.6" opacity="0.25"/>
  <line x1="65" y1="208" x2="65" y2="236" stroke="#D4C4A8" stroke-width="0.6" opacity="0.2"/>
  <!-- Arms raised in joy -->
  <path d="M63 212 Q55 205 50 200" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.18"/>
  <path d="M67 212 Q75 205 80 200" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.18"/>

  <circle cx="85" cy="203" r="7" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="0.5" opacity="0.2"/>
  <line x1="85" y1="210" x2="85" y2="236" stroke="#D4C4A8" stroke-width="0.5" opacity="0.15"/>
  <path d="M83 214 Q78 208 74 205" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.12"/>

  <!-- Right group -->
  <circle cx="295" cy="200" r="8" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="0.6" opacity="0.25"/>
  <line x1="295" y1="208" x2="295" y2="236" stroke="#D4C4A8" stroke-width="0.6" opacity="0.2"/>
  <path d="M293 212 Q285 205 280 200" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.18"/>
  <path d="M297 212 Q305 205 310 200" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.18"/>

  <circle cx="275" cy="203" r="7" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="0.5" opacity="0.2"/>
  <line x1="275" y1="210" x2="275" y2="236" stroke="#D4C4A8" stroke-width="0.5" opacity="0.15"/>
  <path d="M277 214 Q282 208 286 205" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.12"/>

  <!-- Text -->
  <text x="180" y="275" text-anchor="middle" fill="#D4C4A8" font-family="serif" font-size="11" opacity="0.5" letter-spacing="3">ALIVE</text>
</svg>