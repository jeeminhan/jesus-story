<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300">
  <defs>
    <style>
      @keyframes messengerRun {
        0% { transform: translateX(-30px); }
        100% { transform: translateX(30px); }
      }
      @keyframes dustKick {
        0% { opacity: 0; transform: translateY(0) scale(0.5); }
        30% { opacity: 0.5; }
        100% { opacity: 0; transform: translateY(-16px) scale(1.4); }
      }
      @keyframes robeFlow {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(4deg); }
        75% { transform: rotate(-3deg); }
      }
      @keyframes starTwinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.85; }
      }
    </style>
  </defs>

  <rect width="360" height="300" fill="#0D0A0E"/>

  <!-- Stars -->
  <circle cx="30" cy="25" r="1" fill="#D4C4A8" opacity="0.5" style="animation: starTwinkle 3s ease-in-out infinite;"/>
  <circle cx="85" cy="40" r="0.8" fill="#D4C4A8" opacity="0.7" style="animation: starTwinkle 4s ease-in-out infinite 0.5s;"/>
  <circle cx="150" cy="18" r="1.2" fill="#D4C4A8" opacity="0.4" style="animation: starTwinkle 2.5s ease-in-out infinite 1s;"/>
  <circle cx="220" cy="32" r="0.7" fill="#D4C4A8" opacity="0.6" style="animation: starTwinkle 3.5s ease-in-out infinite 0.3s;"/>
  <circle cx="310" cy="22" r="1" fill="#D4C4A8" opacity="0.5" style="animation: starTwinkle 2.8s ease-in-out infinite 0.7s;"/>
  <circle cx="270" cy="50" r="0.6" fill="#D4C4A8" opacity="0.4" style="animation: starTwinkle 4.2s ease-in-out infinite 1.2s;"/>
  <circle cx="55" cy="60" r="0.9" fill="#D4C4A8" opacity="0.3" style="animation: starTwinkle 3.3s ease-in-out infinite 0.9s;"/>
  <circle cx="340" cy="55" r="0.5" fill="#D4C4A8" opacity="0.5" style="animation: starTwinkle 2.2s ease-in-out infinite 1.5s;"/>
  <circle cx="195" cy="45" r="0.6" fill="#D4C4A8" opacity="0.35" style="animation: starTwinkle 3.8s ease-in-out infinite 0.4s;"/>

  <!-- Moon glow -->
  <circle cx="300" cy="55" r="22" fill="#C4A66A" opacity="0.06"/>
  <circle cx="300" cy="55" r="14" fill="#C4A66A" opacity="0.1"/>
  <circle cx="300" cy="55" r="8" fill="#D4C4A8" opacity="0.18"/>

  <!-- Distant hills -->
  <path d="M0 180 Q60 140 120 165 Q180 145 240 160 Q300 135 360 155 L360 190 L0 190Z" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="0.5" opacity="0.25"/>
  <path d="M0 188 Q50 175 100 182 Q160 170 220 178 Q280 168 360 178" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.12"/>

  <!-- Distant village (Bethany) on right -->
  <rect x="280" y="148" width="18" height="22" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="0.6" opacity="0.35"/>
  <rect x="284" y="153" width="4" height="5" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.25"/>
  <rect x="290" y="153" width="4" height="5" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.25"/>
  <path d="M278 148 L289 138 L300 148" fill="none" stroke="#D4C4A8" stroke-width="0.6" opacity="0.35"/>
  <rect x="305" y="152" width="14" height="18" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="0.6" opacity="0.3"/>
  <rect x="308" y="156" width="3" height="4" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.2"/>
  <path d="M303 152 L312 144 L321 152" fill="none" stroke="#D4C4A8" stroke-width="0.6" opacity="0.3"/>
  <rect x="309" y="157" width="2" height="2" fill="#C4A66A" opacity="0.35"/>
  <!-- Second building -->
  <rect x="325" y="155" width="10" height="15" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="0.5" opacity="0.25"/>
  <path d="M323 155 L330 149 L337 155" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.25"/>

  <!-- Olive tree left -->
  <line x1="45" y1="235" x2="45" y2="195" stroke="#D4C4A8" stroke-width="1.5" opacity="0.45"/>
  <line x1="45" y1="210" x2="35" y2="198" stroke="#D4C4A8" stroke-width="1" opacity="0.35"/>
  <line x1="45" y1="205" x2="58" y2="192" stroke="#D4C4A8" stroke-width="1" opacity="0.35"/>
  <line x1="45" y1="215" x2="30" y2="205" stroke="#D4C4A8" stroke-width="0.7" opacity="0.25"/>
  <ellipse cx="32" cy="193" rx="10" ry="6" fill="none" stroke="#D4C4A8" stroke-width="0.6" opacity="0.3"/>
  <ellipse cx="48" cy="188" rx="12" ry="7" fill="none" stroke="#D4C4A8" stroke-width="0.6" opacity="0.3"/>
  <ellipse cx="60" cy="190" rx="8" ry="5" fill="none" stroke="#D4C4A8" stroke-width="0.6" opacity="0.25"/>
  <ellipse cx="25" cy="202" rx="7" ry="4" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.2"/>
  <path d="M28 192 Q32 189 36 192" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.25"/>
  <path d="M44 186 Q48 183 52 186" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.25"/>
  <path d="M56 188 Q60 185 63 189" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.2"/>

  <!-- Ground with dusty road -->
  <line x1="0" y1="240" x2="360" y2="240" stroke="#D4C4A8" stroke-width="0.8" opacity="0.4"/>
  <path d="M0 242 Q90 246 180 241 Q270 237 360 243" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.25"/>
  <path d="M0 248 Q90 252 180 248 Q270 244 360 249" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.2"/>
  <!-- Path texture -->
  <line x1="20" y1="243" x2="26" y2="243" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <line x1="50" y1="244" x2="55" y2="244" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <line x1="90" y1="243" x2="94" y2="243" stroke="#D4C4A8" stroke-width="0.4" opacity="0.12"/>
  <line x1="130" y1="242" x2="136" y2="242" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <line x1="200" y1="241" x2="207" y2="241" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <line x1="250" y1="240" x2="255" y2="240" stroke="#D4C4A8" stroke-width="0.4" opacity="0.12"/>
  <line x1="300" y1="241" x2="306" y2="241" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <line x1="340" y1="242" x2="348" y2="242" stroke="#D4C4A8" stroke-width="0.4" opacity="0.12"/>

  <!-- Stones on ground -->
  <ellipse cx="70" cy="244" rx="3" ry="1.5" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.2"/>
  <ellipse cx="160" cy="246" rx="2" ry="1" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <ellipse cx="240" cy="243" rx="2.5" ry="1.2" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.18"/>
  <circle cx="110" cy="245" r="1" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.15"/>
  <circle cx="320" cy="244" r="1.5" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.15"/>

  <!-- Grass tufts -->
  <path d="M10 240 Q12 233 14 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.2"/>
  <path d="M12 240 Q15 231 17 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.18"/>
  <path d="M330 240 Q332 234 334 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.2"/>
  <path d="M332 240 Q335 232 337 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.18"/>
  <path d="M100 240 Q102 235 104 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <path d="M265 240 Q267 234 269 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>

  <!-- MESSENGER FIGURE (running) -->
  <g style="animation: messengerRun 2.5s ease-in-out infinite alternate;">
    <!-- Head -->
    <circle cx="170" cy="200" r="13" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="1.2"/>
    <!-- Head covering -->
    <path d="M158 196 Q170 185 182 196" fill="none" stroke="#D4C4A8" stroke-width="0.8"/>
    <path d="M158 196 Q155 210 157 215" fill="none" stroke="#D4C4A8" stroke-width="0.6" opacity="0.5"/>
    <!-- Eye (open, alert) -->
    <circle cx="175" cy="199" r="1.3" fill="#D4C4A8"/>
    <circle cx="167" cy="200" r="0.8" fill="#D4C4A8" opacity="0.5"/>
    <!-- Eyebrow (urgent) -->
    <path d="M172 196 Q175 195 178 196" fill="none" stroke="#D4C4A8" stroke-width="0.4"/>
    <!-- Nose -->
    <line x1="172" y1="201" x2="174" y2="204" stroke="#D4C4A8" stroke-width="0.5"/>
    <!-- Mouth (open, panting) -->
    <ellipse cx="175" cy="207" rx="2" ry="1.2" fill="none" stroke="#D4C4A8" stroke-width="0.5"/>
    <!-- Sweat drop -->
    <circle cx="162" cy="198" r="0.7" fill="#D4C4A8" opacity="0.3"/>

    <!-- Neck -->
    <line x1="170" y1="213" x2="171" y2="218" stroke="#D4C4A8" stroke-width="1.2"/>
    <!-- Body (leaning forward, running posture) -->
    <path d="M171 218 Q176 228 173 238" fill="none" stroke="#D4C4A8" stroke-width="1.2"/>
    <!-- Robe flowing behind -->
    <path d="M168 220 Q162 228 158 238" fill="none" stroke="#D4C4A8" stroke-width="0.6" opacity="0.45" style="transform-box: fill-box; transform-origin: 50% 0%; animation: robeFlow 1.2s ease-in-out infinite;"/>
    <path d="M173 222 Q179 230 182 238" fill="none" stroke="#D4C4A8" stroke-width="0.6" opacity="0.45" style="transform-box: fill-box; transform-origin: 50% 0%; animation: robeFlow 1.2s ease-in-out infinite 0.3s;"/>
    <path d="M165 225 Q158 232 154 238" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.3" style="transform-box: fill-box; transform-origin: 50% 0%; animation: robeFlow 1.4s ease-in-out infinite 0.15s;"/>

    <!-- Arm forward -->
    <path d="M171 220 Q186 215 193 218" fill="none" stroke="#D4C4A8" stroke-width="1"/>
    <line x1="193" y1="218" x2="196" y2="216" stroke="#D4C4A8" stroke-width="0.5"/>
    <line x1="193" y1="218" x2="196" y2="219" stroke="#D4C4A8" stroke-width="0.5"/>
    <line x1="193" y1="218" x2="195" y2="221" stroke="#D4C4A8" stroke-width="0.4"/>

    <!-- Arm back -->
    <path d="M170 220 Q155 228 147 225" fill="none" stroke="#D4C4A8" stroke-width="1"/>
    <line x1="147" y1="225" x2="144" y2="224" stroke="#D4C4A8" stroke-width="0.5"/>
    <line x1="147" y1="225" x2="145" y2="227" stroke="#D4C4A8" stroke-width="0.5"/>

    <!-- Leg forward -->
    <path d="M173 238 Q186 245 191 240" fill="none" stroke="#D4C4A8" stroke-width="1.2"/>
    <line x1="191" y1="240" x2="197" y2="240" stroke="#D4C4A8" stroke-width="1"/>
    <!-- Leg back -->
    <path d="M172 238 Q158 248 151 240" fill="none" stroke="#D4C4A8" stroke-width="1.2"/>
    <line x1="151" y1="240" x2="146" y2="240" stroke="#D4C4A8" stroke-width="1"/>

    <!-- Scroll in hand -->
    <rect x="192" y="214" width="7" height="4" rx="1.5" fill="none" stroke="#C4A66A" stroke-width="0.6" opacity="0.6"/>
    <line x1="193" y1="215" x2="193" y2="217" stroke="#C4A66A" stroke-width="0.3" opacity="0.4"/>
  </g>

  <!-- Dust clouds behind runner -->
  <circle cx="145" cy="240" r="4" fill="#D4C4A8" opacity="0" style="animation: dustKick 1.5s ease-out infinite;"/>
  <circle cx="140" cy="242" r="3" fill="#D4C4A8" opacity="0" style="animation: dustKick 1.5s ease-out infinite 0.3s;"/>
  <circle cx="148" cy="241" r="2.5" fill="#D4C4A8" opacity="0" style="animation: dustKick 1.5s ease-out infinite 0.6s;"/>
  <circle cx="135" cy="240" r="3.5" fill="#D4C4A8" opacity="0" style="animation: dustKick 1.8s ease-out infinite 0.15s;"/>
  <circle cx="142" cy="243" r="2" fill="#D4C4A8" opacity="0" style="animation: dustKick 1.6s ease-out infinite 0.45s;"/>

  <!-- Ground shadow under runner -->
  <ellipse cx="170" cy="241" rx="20" ry="2" fill="#D4C4A8" opacity="0.06" style="animation: messengerRun 2.5s ease-in-out infinite alternate;"/>

  <!-- Text -->
  <text x="180" y="280" text-anchor="middle" fill="#D4C4A8" font-family="serif" font-size="11" opacity="0.5" letter-spacing="3">THE URGENT MESSAGE</text>
</svg>