<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 300">
  <defs>
    <style>
      @keyframes emergeSlow {
        0% { transform: translateX(-8px); opacity: 0.3; }
        100% { transform: translateX(8px); opacity: 0.9; }
      }
      @keyframes lightExpand1 {
        0% { r: 10; opacity: 0.15; }
        100% { r: 60; opacity: 0; }
      }
      @keyframes lightExpand2 {
        0% { r: 8; opacity: 0.12; }
        100% { r: 50; opacity: 0; }
      }
      @keyframes clothDangle {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(2deg); }
        75% { transform: rotate(-2deg); }
      }
      @keyframes lightBeam {
        0%, 100% { opacity: 0.05; }
        50% { opacity: 0.12; }
      }
    </style>
  </defs>

  <rect width="360" height="300" fill="#0D0A0E"/>

  <!-- Stars -->
  <circle cx="20" cy="22" r="0.6" fill="#D4C4A8" opacity="0.22"/>
  <circle cx="70" cy="15" r="0.5" fill="#D4C4A8" opacity="0.18"/>
  <circle cx="130" cy="28" r="0.7" fill="#D4C4A8" opacity="0.2"/>
  <circle cx="350" cy="35" r="0.5" fill="#D4C4A8" opacity="0.15"/>

  <!-- Rocky tomb surround (right half = cliff) -->
  <path d="M170 65 Q210 50 260 45 Q310 42 340 55 Q360 70 360 90 L360 240 L170 240Z" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="0.8" opacity="0.35"/>
  <!-- Rock texture -->
  <path d="M185 80 Q205 73 220 78" fill="none" stroke="#D4C4A8" stroke-width="0.25" opacity="0.1"/>
  <path d="M260 52 Q280 50 300 57" fill="none" stroke="#D4C4A8" stroke-width="0.25" opacity="0.08"/>
  <path d="M340 62 Q350 68 358 78" fill="none" stroke="#D4C4A8" stroke-width="0.2" opacity="0.07"/>
  <path d="M190 105 Q210 100 225 105" fill="none" stroke="#D4C4A8" stroke-width="0.2" opacity="0.07"/>
  <path d="M250 55 L255 72 L252 85" fill="none" stroke="#D4C4A8" stroke-width="0.2" opacity="0.08"/>
  <path d="M310 58 L315 75" fill="none" stroke="#D4C4A8" stroke-width="0.18" opacity="0.06"/>

  <!-- TOMB ENTRANCE (the dark mouth) -->
  <path d="M230 105 Q230 85 258 80 Q285 75 295 85 Q305 95 305 110 Q305 135 295 150 L230 150 Q220 135 220 120 Q220 112 230 105Z" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="262" cy="120" rx="30" ry="26" fill="#0D0A0E" opacity="0.95"/>

  <!-- Stone rolled far aside -->
  <circle cx="330" cy="142" r="20" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="0.8" opacity="0.3"/>
  <path d="M320 135 Q330 132 340 136" fill="none" stroke="#D4C4A8" stroke-width="0.25" opacity="0.1"/>
  <path d="M322 142 Q330 140 338 143" fill="none" stroke="#D4C4A8" stroke-width="0.2" opacity="0.08"/>

  <!-- LIGHT streaming from tomb entrance (Lazarus emerging) -->
  <!-- Light beams radiating outward from tomb mouth -->
  <path d="M235 120 L180 100" fill="none" stroke="#C4A66A" stroke-width="0.8" opacity="0.06" style="animation: lightBeam 3s ease-in-out infinite;"/>
  <path d="M235 130 L170 130" fill="none" stroke="#C4A66A" stroke-width="0.8" opacity="0.06" style="animation: lightBeam 3s ease-in-out infinite 0.5s;"/>
  <path d="M235 140 L180 160" fill="none" stroke="#C4A66A" stroke-width="0.8" opacity="0.06" style="animation: lightBeam 3s ease-in-out infinite 1s;"/>
  <path d="M235 125 L185 110" fill="none" stroke="#C4A66A" stroke-width="0.6" opacity="0.04" style="animation: lightBeam 3.5s ease-in-out infinite 0.3s;"/>
  <path d="M235 135 L175 145" fill="none" stroke="#C4A66A" stroke-width="0.6" opacity="0.04" style="animation: lightBeam 3.5s ease-in-out infinite 0.8s;"/>

  <!-- Expanding light circles from emergence point -->
  <circle cx="230" cy="130" fill="none" stroke="#C4A66A" stroke-width="0.5">
    <animate attributeName="r" values="10;60;60" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.15;0;0" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="230" cy="130" fill="none" stroke="#C4A66A" stroke-width="0.4">
    <animate attributeName="r" values="8;50;50" dur="4s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0.12;0;0" dur="4s" repeatCount="indefinite" begin="1s"/>
  </circle>
  <circle cx="230" cy="130" fill="none" stroke="#C4A66A" stroke-width="0.3">
    <animate attributeName="r" values="5;40;40" dur="4s" repeatCount="indefinite" begin="2s"/>
    <animate attributeName="opacity" values="0.1;0;0" dur="4s" repeatCount="indefinite" begin="2s"/>
  </circle>
  <circle cx="230" cy="130" fill="none" stroke="#C4A66A" stroke-width="0.3">
    <animate attributeName="r" values="5;35;35" dur="4s" repeatCount="indefinite" begin="3s"/>
    <animate attributeName="opacity" values="0.08;0;0" dur="4s" repeatCount="indefinite" begin="3s"/>
  </circle>

  <!-- Ground -->
  <line x1="0" y1="240" x2="170" y2="240" stroke="#D4C4A8" stroke-width="0.8" opacity="0.3"/>
  <path d="M170 155 Q150 190 110 220 Q70 240 0 240" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>
  <line x1="170" y1="155" x2="170" y2="240" stroke="#D4C4A8" stroke-width="0.3" opacity="0.08"/>
  <!-- Stones -->
  <ellipse cx="160" cy="162" rx="2.5" ry="1.2" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.1"/>
  <ellipse cx="200" cy="158" rx="2" ry="1" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.08"/>
  <circle cx="140" cy="228" r="1.5" fill="none" stroke="#D4C4A8" stroke-width="0.3" opacity="0.08"/>
  <line x1="40" y1="242" x2="48" y2="242" stroke="#D4C4A8" stroke-width="0.3" opacity="0.08"/>
  <line x1="90" y1="238" x2="98" y2="238" stroke="#D4C4A8" stroke-width="0.3" opacity="0.06"/>

  <!-- LAZARUS (wrapped figure emerging from dark into light) -->
  <g style="animation: emergeSlow 5s ease-in-out infinite alternate;">
    <!-- Warm glow around Lazarus -->
    <circle cx="218" cy="130" r="25" fill="#C4A66A" opacity="0.05"/>

    <!-- Head (wrapped, face partially visible) -->
    <circle cx="218" cy="108" r="12" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="1.1"/>
    <!-- Burial wrapping on head -->
    <path d="M207 105 Q218 98 229 105" fill="none" stroke="#D4C4A8" stroke-width="0.7" opacity="0.6"/>
    <path d="M208 110 Q218 106 228 110" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.4"/>
    <path d="M210 114 Q218 111 226 114" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.35"/>
    <!-- One eye barely visible -->
    <circle cx="222" cy="107" r="0.8" fill="#D4C4A8" opacity="0.4"/>
    <!-- Mouth covered by wrap -->
    <line x1="215" y1="113" x2="222" y2="113" stroke="#D4C4A8" stroke-width="0.4" opacity="0.3"/>

    <!-- Neck wrapped -->
    <line x1="218" y1="120" x2="218" y2="126" stroke="#D4C4A8" stroke-width="1.1"/>
    <path d="M214 121 Q218 119 222 121" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.35"/>

    <!-- Body (wrapped in burial linens) -->
    <path d="M218 126 Q220 142 218 155" fill="none" stroke="#D4C4A8" stroke-width="1.3"/>
    <!-- Wrapping bands across body -->
    <path d="M210 130 Q218 127 226 130" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.4"/>
    <path d="M209 136 Q218 133 227 136" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.35"/>
    <path d="M210 142 Q218 139 226 142" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.35"/>
    <path d="M211 148 Q218 145 225 148" fill="none" stroke="#D4C4A8" stroke-width="0.5" opacity="0.3"/>

    <!-- Arms bound close to body -->
    <path d="M215 130 Q208 138 206 148" fill="none" stroke="#D4C4A8" stroke-width="0.9" opacity="0.5"/>
    <path d="M221 130 Q228 138 230 148" fill="none" stroke="#D4C4A8" stroke-width="0.9" opacity="0.5"/>

    <!-- Dangling cloth strips -->
    <line x1="206" y1="148" x2="203" y2="160" stroke="#D4C4A8" stroke-width="0.5" opacity="0.35" style="transform-box: fill-box; transform-origin: 50% 0%; animation: clothDangle 2s ease-in-out infinite;"/>
    <line x1="230" y1="148" x2="233" y2="162" stroke="#D4C4A8" stroke-width="0.5" opacity="0.35" style="transform-box: fill-box; transform-origin: 50% 0%; animation: clothDangle 2.2s ease-in-out infinite 0.4s;"/>
    <line x1="210" y1="142" x2="205" y2="155" stroke="#D4C4A8" stroke-width="0.4" opacity="0.25" style="transform-box: fill-box; transform-origin: 50% 0%; animation: clothDangle 2.5s ease-in-out infinite 0.8s;"/>
    <line x1="226" y1="140" x2="232" y2="153" stroke="#D4C4A8" stroke-width="0.4" opacity="0.25" style="transform-box: fill-box; transform-origin: 50% 0%; animation: clothDangle 2.3s ease-in-out infinite 0.2s;"/>

    <!-- Legs (bound together, shuffling step) -->
    <path d="M217 155 Q214 162 213 170" fill="none" stroke="#D4C4A8" stroke-width="1.1"/>
    <path d="M219 155 Q222 162 223 170" fill="none" stroke="#D4C4A8" stroke-width="1.1"/>
    <!-- Wrapping on legs -->
    <path d="M212 160 Q218 157 224 160" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.3"/>
    <path d="M212 166 Q218 163 224 166" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.25"/>
    <!-- Feet -->
    <line x1="213" y1="170" x2="209" y2="172" stroke="#D4C4A8" stroke-width="0.8"/>
    <line x1="223" y1="170" x2="227" y2="172" stroke="#D4C4A8" stroke-width="0.8"/>
  </g>

  <!-- Falling cloth strips (separate, floating down) -->
  <line x1="200" y1="125" x2="195" y2="145" stroke="#D4C4A8" stroke-width="0.4" opacity="0.2" style="transform-box: fill-box; transform-origin: 50% 0%; animation: clothDangle 3s ease-in-out infinite;"/>
  <line x1="240" y1="120" x2="245" y2="140" stroke="#D4C4A8" stroke-width="0.4" opacity="0.18" style="transform-box: fill-box; transform-origin: 50% 0%; animation: clothDangle 3.2s ease-in-out infinite 0.5s;"/>

  <!-- Onlookers in background (gasping) -->
  <circle cx="60" cy="210" r="7" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="0.5" opacity="0.2"/>
  <line x1="60" y1="217" x2="60" y2="238" stroke="#D4C4A8" stroke-width="0.5" opacity="0.15"/>
  <circle cx="80" cy="212" r="6" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="0.5" opacity="0.18"/>
  <line x1="80" y1="218" x2="80" y2="238" stroke="#D4C4A8" stroke-width="0.5" opacity="0.13"/>
  <circle cx="100" cy="208" r="7.5" fill="#0D0A0E" stroke="#D4C4A8" stroke-width="0.5" opacity="0.22"/>
  <line x1="100" y1="215" x2="100" y2="238" stroke="#D4C4A8" stroke-width="0.5" opacity="0.17"/>
  <!-- One with mouth open in shock -->
  <path d="M97 211 Q100 214 103 211" fill="none" stroke="#D4C4A8" stroke-width="0.4" opacity="0.15"/>

  <!-- Text -->
  <text x="180" y="275" text-anchor="middle" fill="#D4C4A8" font-family="serif" font-size="11" opacity="0.5" letter-spacing="3">THE EMERGENCE</text>
</svg>