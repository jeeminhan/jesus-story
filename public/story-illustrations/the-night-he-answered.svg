<svg viewBox="0 0 360 480" xmlns="http://www.w3.org/2000/svg" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <style>
    @keyframes wound-pulse {
      0%, 100% { transform: scale(1);    opacity: 0.75; }
      50%      { transform: scale(1.22); opacity: 1;    }
    }
    @keyframes wound-dot-pulse {
      0%, 100% { opacity: 0.7; }
      50%      { opacity: 1;   }
    }
    @keyframes glow-ring {
      0%, 100% { r: 10; opacity: 0.08; }
      50%      { r: 22; opacity: 0.0; }
    }
    @keyframes hand-reveal {
      from { opacity: 0; transform: translateX(var(--dx, 0px)); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes gap-breathe {
      0%, 100% { opacity: 0.04; }
      50%      { opacity: 0.09; }
    }
    #left-hand {
      --dx: -12px;
      animation: hand-reveal 2.2s ease-out forwards;
    }
    #right-hand {
      --dx: 12px;
      opacity: 0;
      animation: hand-reveal 2.2s ease-out 0.6s forwards;
    }
    #wound-ring {
      transform-box: fill-box;
      transform-origin: center;
      animation: wound-pulse 3.2s ease-in-out 1.8s infinite;
    }
    #wound-dot {
      animation: wound-dot-pulse 3.2s ease-in-out 1.8s infinite;
    }
    #wound-glow {
      animation: glow-ring 3.2s ease-in-out 1.8s infinite;
    }
    #gap-glow {
      animation: gap-breathe 4s ease-in-out infinite;
    }
  </style>

  <rect width="360" height="480" fill="#0D0A0E"/>

  <!-- Gap glow between hands -->
  <ellipse id="gap-glow" cx="180" cy="264" rx="20" ry="14" fill="#C4A66A"/>

  <!-- Left forearm + hand -->
  <g id="left-hand">
    <path d="M0 275 C50 267 95 257 132 249" stroke="#D4C4A8" stroke-width="1.5"/>
    <path d="M0 290 C50 282 95 272 130 264" stroke="#D4C4A8" stroke-width="1.5"/>
    <path d="M132 249 C138 247 142 247 144 250 L145 262 C145 262 148 248 152 247 C156 246 159 248 159 252 L158 264 C158 264 161 250 165 249 C169 248 172 251 172 255 L169 266 C169 266 172 254 176 254 C180 254 182 257 181 261 L176 272 C174 278 168 282 162 282 L148 280 C142 280 136 278 132 274 L130 264Z" stroke="#D4C4A8" stroke-width="1.3" fill="#0D0A0E"/>
    <path d="M132 264 C127 264 122 260 122 254 C122 249 126 246 130 248" stroke="#D4C4A8" stroke-width="1.2"/>
  </g>

  <!-- Right forearm + hand (wound side) -->
  <g id="right-hand">
    <path d="M360 275 C310 267 265 257 228 249" stroke="#D4C4A8" stroke-width="1.5"/>
    <path d="M360 290 C310 282 265 272 230 264" stroke="#D4C4A8" stroke-width="1.5"/>
    <path d="M228 249 C222 247 218 247 216 250 L215 262 C215 262 212 248 208 247 C204 246 201 248 201 252 L202 264 C202 264 199 250 195 249 C191 248 188 251 188 255 L191 266 C191 266 188 254 184 254 C180 254 178 257 179 261 L184 272 C186 278 192 282 198 282 L212 280 C218 280 224 278 228 274 L230 264Z" stroke="#D4C4A8" stroke-width="1.3" fill="#0D0A0E"/>
    <path d="M228 264 C233 264 238 260 238 254 C238 249 234 246 230 248" stroke="#D4C4A8" stroke-width="1.2"/>

    <!-- Wound: outer glow, ring, dot -->
    <circle id="wound-glow" cx="205" cy="264" r="10" fill="#C4A66A"/>
    <circle id="wound-ring"  cx="205" cy="264" r="6"  stroke="#C4A66A" stroke-width="1.5" fill="none"/>
    <circle id="wound-dot"   cx="205" cy="264" r="2"  fill="#C4A66A"/>
  </g>
</svg>
